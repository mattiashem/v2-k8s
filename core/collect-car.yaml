apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collect-car
  namespace: argocd
spec:
  project: core
  source:
    repoURL: git@github.com:mattiashem/v2-k8s.git
    targetRevision: HEAD
    path: collect-car
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    # Auto-sync, like the mantiser apps on the prod cluster. This is an unattended
    # scheduled job, so a manifest change should reach the cluster without someone
    # remembering to press sync. Prune and selfHeal stay off so the PVC and the
    # out-of-band secrets are never touched.
    automated: {}
    syncOptions:
      - CreateNamespace=true
