apiVersion: apps/v1
kind: Deployment
metadata:
  name: ovos-plugin-ggwave
  namespace: zoe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ovos-plugin-ggwave
  template:
    metadata:
      labels:
        app: ovos-plugin-ggwave
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ovos-plugin-ggwave
        image: docker.io/smartgic/ovos-plugin-ggwave:alpha
        imagePullPolicy: Always
        env:
        - name: TZ
          value: "UTC"
        - name: PULSE_SERVER
          value: "unix:/run/user/1000/pulse/native" # Update path if needed
        - name: PULSE_COOKIE
          value: "/home/ovos/.config/pulse/cookie"
        - name: XDG_RUNTIME_DIR
          value: "/run/user/1000" # Update path if needed
        resources:
          limits:
            memory: "512M"
          requests:
            memory: "128M"
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - ggwave
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dev-snd
          mountPath: /dev/snd
        - name: pulse-cookie
          mountPath: /home/ovos/.config/pulse/cookie
          readOnly: true
        - name: ovos-config-folder
          mountPath: /home/ovos/.config/mycroft
          readOnly: true
        - name: tmp-folder
          mountPath: /tmp/mycroft
        - name: xdg-runtime-dir-pipewire
          mountPath: /run/user/1000/pipewire-0 # Update path if needed
          readOnly: true
        - name: xdg-runtime-dir-pulse
          mountPath: /run/user/1000/pulse # Update path if needed
          readOnly: true
      volumes:
      - name: dev-snd
        hostPath:
          path: /dev/snd
          type: Directory
      - name: pulse-cookie
        hostPath:
          path: /home/user/.config/pulse/cookie # Update path to cookie on host
          type: File
      - name: ovos-config-folder
        hostPath:
          path: /opt/ovos/config # Please update this path
          type: Directory
      - name: tmp-folder
        hostPath:
          path: /tmp # Please update this path
          type: Directory
      - name: xdg-runtime-dir-pipewire
        hostPath:
          path: /run/user/1000/pipewire-0 # Update path if needed
          type: Directory
      - name: xdg-runtime-dir-pulse
        hostPath:
          path: /run/user/1000/pulse # Update path if needed
          type: Directory