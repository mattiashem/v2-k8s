      driver = mysql


      default_pass_scheme = BLF-CRYPT


      password_query = SELECT username AS user,password FROM mailbox WHERE username
      = ''%u'' AND active=''1''


      user_query = SELECT concat(''/var/mail/vmail/'', maildir) AS home, 8 as uid,
      8 as gid FROM mailbox WHERE username = ''%u'' AND active = ''1''

      '
    main.cf: "## (Ensure that there are no other alias_maps definitions)\n#\n#\n#\n\
      #\n#\nmyhostname = mail.robots.beer\nbiff = no\nmynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104\
      \ [::1]/128\nmailbox_size_limit = 0\nrecipient_delimiter = +\ninet_interfaces\
      \ = all\ninet_protocols = ipv4\ncompatibility_level = 3.6\n#######POSFIXADMIN\n\
      ##virtual_mailbox_domains = proxy:mysql:/etc/postfix/sql/mysql_virtual_domains_maps.cf\n\
      virtual_alias_maps =\n   proxy:mysql:/etc/postfix-k8s/mysql_virtual_alias_maps.cf,\n\
      \   proxy:mysql:/etc/postfix-k8s/mysql_virtual_alias_domain_maps.cf,\n   proxy:mysql:/etc/postfix-k8s/mysql_virtual_alias_domain_catchall_maps.cf\n\
      #virtual_mailbox_maps =\n#   proxy:mysql:/etc/postfix/sql/mysql_virtual_mailbox_maps.cf,\n\
      #   proxy:mysql:/etc/postfix/sql/mysql_virtual_alias_domain_mailbox_maps.cf\n\
      # For transport map support, also use the following configuration:\n#relay_domains\
      \ = proxy:mysql:/etc/postfix/sql/mysql_relay_domains.cf\n#transport_maps = proxy:mysql:/etc/postfix/sql/mysql_transport_maps.cf\n\
      #########POSTFIXADMIN\nrelay_domains = proxy:mysql:/etc/postfix-k8s/mysql_relay_domains.cf\n\
      transport_maps = proxy:mysql:/etc/postfix-k8s/mysql_transport_maps.cf\n#virtual_transport\
      \ = virtual\nvirtual_mailbox_domains = proxy:mysql:/etc/postfix-k8s/mysql_virtual_domains_maps.cf\n\
      #virtual_alias_maps = proxy:mysql:/etc/postfix-k8s/mysql_virtual_alias_maps.cf\n\
      #virtual_mailbox_maps = proxy:mysql:/etc/postfix-k8s/mysql_virtual_alias_domain_mailbox_maps.cf\n\
      virtual_mailbox_maps =\n   proxy:mysql:/etc/postfix-k8s/mysql_virtual_mailbox_maps.cf,\n\
      \   proxy:mysql:/etc/postfix-k8s/mysql_virtual_alias_domain_mailbox_maps.cf\n\
      \nvirtual_mailbox_base = /var/mail/vmail\nvirtual_mailbox_limit = 512000000\n\
      virtual_minimum_uid = 8\nvirtual_transport = virtual\nvirtual_uid_maps = static:8\n\
      virtual_gid_maps = static:8\nlocal_transport = virtual\nlocal_recipient_maps\
      \ = $virtual_mailbox_maps\n#smtpd_sender_login_maps = proxy:mysql:/etc/postfix-k8s/virtual_sender_maps.cf\n\
      smtpd_sasl_path = private/auth\nsmtpd_sasl_type = dovecot\nsmtpd_sasl_authenticated_header\
      \ = yes\nsmtpd_sasl_local_domain =\nsmtpd_sasl_auth_enable = yes\nsmtpd_sasl_security_options\
      \ = noanonymous\n#local_transport = virtual\n#local_recipient_maps = $virtual_mailbox_maps\n\
      broken_sasl_auth_clients = yes\nsmtpd_recipient_restrictions = permit_sasl_authenticated,permit_mynetworks,reject_unauth_destination\n\
      \nsmtp_use_tls = yes\nsmtpd_use_tls = yes\nsmtp_tls_security_level = may\nsmtpd_tls_security_level\
      \ = encrypt\nsmtpd_tls_auth_only = yes\nsmtp_tls_note_starttls_offer = yes\n\
      #smtpd_tls_auth_only = yes\nsmtp_tls_note_starttls_offer = yes\nsmtpd_tls_key_file\
      \ = /etc/postfix-ssl/tls.key\nsmtpd_tls_cert_file = /etc/postfix-ssl/tls.crt\n\
      smtpd_tls_CAfile = /etc/postfix-ssl/tls.crt\nsmtpd_tls_loglevel = 1\n\nsmtpd_tls_received_header\
      \ = yes\nsmtpd_tls_session_cache_timeout = 3600s\nsmtpd_tls_mandatory_protocols\
      \ = !SSLv2, !SSLv3\nsmtpd_tls_protocols = !SSLv2, !SSLv3\nsmtp_tls_mandatory_protocols\
      \ = !SSLv2, !SSLv3\nsmtp_tls_protocols = !SSLv2, !SSLv3\n\nsmtp_tls_exclude_ciphers\
      \ = EXP, MEDIUM, LOW, DES, 3DES, SSLv2\nsmtpd_tls_exclude_ciphers = EXP, MEDIUM,\
      \ LOW, DES, 3DES, SSLv2\n\ntls_high_cipherlist = kEECDH:+kEECDH+SHA:kEDH:+kEDH+SHA:+kEDH+CAMELLIA:kECDH:+kECDH+SHA:kRSA:+kRSA+SHA:+kRSA+CAMELLIA:!aNULL:!eNULL:!SSLv2:!RC4:!MD5:!DES:!EXP:!SEED:!IDEA:!3DES\n\
      tls_medium_cipherlist = kEECDH:+kEECDH+SHA:kEDH:+kEDH+SHA:+kEDH+CAMELLIA:kECDH:+kECDH+SHA:kRSA:+kRSA+SHA:+kRSA+CAMELLIA:!aNULL:!eNULL:!SSLv2:!MD5:!DES:!EXP:!SEED:!IDEA:!3DES\n\
      \nsmtp_tls_ciphers = high\nsmtpd_tls_ciphers = high\ntls_random_source = dev:/dev/urandom\n\
      maillog_file = /dev/stdout\nsmtpd_milters = inet:opendkim.hrb.svc.cluster.local:8891\n\
      non_smtpd_milters = $smtpd_milters\nmilter_default_action = accept\n"
