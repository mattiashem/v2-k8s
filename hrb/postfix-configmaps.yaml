apiVersion: v1
items:
- apiVersion: v1
  data:
    master.cf: "#\n# Postfix master process configuration file.  For details on the\
      \ format\n# of the file, see the master(5) manual page (command: \"man 5 master\"\
      \ or\n# on-line: http://www.postfix.org/master.5.html).\n#\n# Do not forget\
      \ to execute \"postfix reload\" after editing this file.\n#\n# ==========================================================================\n\
      # service type  private unpriv  chroot  wakeup  maxproc command + args\n#  \
      \             (yes)   (yes)   (no)    (never) (100)\n# ==========================================================================\n\
      smtp    inet    n    -    n    -    -    smtpd\n  -o smtpd_recipient_restrictions=reject_invalid_helo_hostname\n\
      \  -o smtpd_helo_required=yes\n  -o disable_vrfy_command=yes\n  -o smtpd_milters=inet:opendkim.hrb.svc.cluster.local:8891\n\
      \  -o content_filter=smtp-amavis:[amavis.hrb.svc.cluster.local]:10024\nsmtp-amavis\
      \        unix    -    -    n    -    2    smtp\n  -o smtp_data_done_timeout=1200\n\
      \  -o smtp_send_xforward_command=yes\n  -o max_use=20\n10025    inet    n  \
      \  -    n    -    -    smtpd\n  -o content_filter=\n  -o smtpd_tls_security_level=none\n\
      \  -o smtp_tls_wrappermode=no\n  -o local_recipient_maps=\n  -o relay_recipient_maps=\n\
      \  -o smtpd_restriction_classes=\n  -o smtpd_delay_reject=no\n  -o smtpd_client_restrictions=permit_mynetworks,reject\n\
      \  -o smtpd_helo_restrictions=\n  -o smtpd_sender_restrictions=\n  -o smtpd_recipient_restrictions=permit_mynetworks,reject\n\
      \  -o smtpd_data_restrictions=reject_unauth_pipelining\n  -o smtpd_end_of_data_restrictions=\n\
      \  -o mynetworks=127.0.0.0/8,10.0.0.0/8\n  -o smtpd_error_sleep_time=0\n  -o\
      \ smtpd_soft_error_limit=1001\n  -o smtpd_hard_error_limit=1000\n  -o smtpd_client_connection_count_limit=0\n\
      \  -o smtpd_client_connection_rate_limit=0\n  -o receive_override_options=no_header_body_checks,no_unknown_recipient_checks,no_milters\n\
      \  -o local_header_rewrite_clients=\n  -o smtpd_milters=\n10027    inet    n\
      \    -    n    -    -    smtpd\n  -o content_filter=\n  -o smtpd_tls_security_level=none\n\
      \  -o smtp_tls_wrappermode=no\n  -o local_recipient_maps=\n  -o relay_recipient_maps=\n\
      \  -o smtpd_restriction_classes=\n  -o smtpd_delay_reject=no\n  -o smtpd_client_restrictions=permit_mynetworks,reject\n\
      \  -o smtpd_helo_restrictions=\n  -o smtpd_sender_restrictions=\n  -o smtpd_recipient_restrictions=permit_mynetworks,reject\n\
      \  -o smtpd_data_restrictions=reject_unauth_pipelining\n  -o smtpd_end_of_data_restrictions=\n\
      \  -o mynetworks=127.0.0.0/8,10.0.0.0/8\n  -o smtpd_error_sleep_time=0\n  -o\
      \ smtpd_soft_error_limit=1001\n  -o smtpd_hard_error_limit=1000\n  -o smtpd_client_connection_count_limit=0\n\
      \  -o smtpd_client_connection_rate_limit=0\n  -o receive_override_options=no_header_body_checks,no_unknown_recipient_checks\n\
      \  -o local_header_rewrite_clients=\n  -o smtpd_milters=inet:opendkim.hrb.svc.cluster.local:8891\n\
      submission    inet    n    -    n    -    -    smtpd\n  -o syslog_name=postfix/submission\n\
      \  -o smtpd_tls_security_level=encrypt\n  -o smtpd_sasl_auth_enable=yes\n  -o\
      \ smtpd_tls_auth_only=yes\n  -o smtpd_reject_unlisted_recipient=no\n  #-o smtpd_client_restrictions=$mua_client_restrictions\n\
      \  #-o smtpd_helo_restrictions=$mua_helo_restrictions\n  #-o smtpd_sender_restrictions=$mua_sender_restrictions\n\
      \  -o smtpd_recipient_restrictions=\n  -o smtpd_relay_restrictions=permit_sasl_authenticated,reject\n\
      \  -o milter_macro_daemon_name=ORIGINATING\n  -o disable_vrfy_command=yes\n\
      #smtp      inet  n       -       y       -       -       smtpd\n#smtp      inet\
      \  n       -       y       -       1       postscreen\n#smtpd     pass  -  \
      \     -       y       -       -       smtpd\n#dnsblog   unix  -       -    \
      \   y       -       0       dnsblog\n#tlsproxy  unix  -       -       y    \
      \   -       0       tlsproxy\n# Choose one: enable submission for loopback clients\
      \ only, or for any client.\n#127.0.0.1:submission inet n -   y       -     \
      \  -       smtpd\n#submission inet n       -       y       -       -       smtpd\n\
      #  -o syslog_name=postfix/submission\n#  -o smtpd_tls_security_level=encrypt\n\
      #  -o smtpd_sasl_auth_enable=yes\n#  -o smtpd_tls_auth_only=yes\n#  -o local_header_rewrite_clients=static:all\n\
      #  -o smtpd_reject_unlisted_recipient=no\n#     Instead of specifying complex\
      \ smtpd_<xxx>_restrictions here,\n#     specify \"smtpd_<xxx>_restrictions=$mua_<xxx>_restrictions\"\
      \n#     here, and specify mua_<xxx>_restrictions in main.cf (where\n#     \"\
      <xxx>\" is \"client\", \"helo\", \"sender\", \"relay\", or \"recipient\").\n\
      #  -o smtpd_client_restrictions=\n#  -o smtpd_helo_restrictions=\n#  -o smtpd_sender_restrictions=\n\
      #  -o smtpd_relay_restrictions=\n#  -o smtpd_recipient_restrictions=permit_sasl_authenticated,reject\n\
      #  -o milter_macro_daemon_name=ORIGINATING\n# Choose one: enable submissions\
      \ for loopback clients only, or for any client.\n#127.0.0.1:submissions inet\
      \ n  -       y       -       -       smtpd\n#submissions     inet  n       -\
      \       y       -       -       smtpd\n#  -o syslog_name=postfix/submissions\n\
      #  -o smtpd_tls_wrappermode=yes\n#  -o smtpd_sasl_auth_enable=yes\n#  -o local_header_rewrite_clients=static:all\n\
      #  -o smtpd_reject_unlisted_recipient=no\n#     Instead of specifying complex\
      \ smtpd_<xxx>_restrictions here,\n#     specify \"smtpd_<xxx>_restrictions=$mua_<xxx>_restrictions\"\
      \n#     here, and specify mua_<xxx>_restrictions in main.cf (where\n#     \"\
      <xxx>\" is \"client\", \"helo\", \"sender\", \"relay\", or \"recipient\").\n\
      #  -o smtpd_client_restrictions=\n#  -o smtpd_helo_restrictions=\n#  -o smtpd_sender_restrictions=\n\
      #  -o smtpd_relay_restrictions=\n#  -o smtpd_recipient_restrictions=permit_sasl_authenticated,reject\n\
      #  -o milter_macro_daemon_name=ORIGINATING\n#628       inet  n       -     \
      \  y       -       -       qmqpd\npickup    unix  n       -       y       60\
      \      1       pickup\ncleanup   unix  n       -       y       -       0   \
      \    cleanup\nqmgr      unix  n       -       n       300     1       qmgr\n\
      #qmgr     unix  n       -       n       300     1       oqmgr\ntlsmgr    unix\
      \  -       -       y       1000?   1       tlsmgr\nrewrite   unix  -       -\
      \       y       -       -       trivial-rewrite\nbounce    unix  -       - \
      \      y       -       0       bounce\ndefer     unix  -       -       y   \
      \    -       0       bounce\ntrace     unix  -       -       y       -     \
      \  0       bounce\nverify    unix  -       -       y       -       1       verify\n\
      flush     unix  n       -       y       1000?   0       flush\nproxymap  unix\
      \  -       -       n       -       -       proxymap\nproxywrite unix -     \
      \  -       n       -       1       proxymap\nsmtp      unix  -       -     \
      \  y       -       -       smtp\nrelay     unix  -       -       y       - \
      \      -       smtp\n        -o syslog_name=postfix/$service_name\n#       -o\
      \ smtp_helo_timeout=5 -o smtp_connect_timeout=5\nshowq     unix  n       - \
      \      y       -       -       showq\nerror     unix  -       -       y    \
      \   -       -       error\nretry     unix  -       -       y       -       -\
      \       error\ndiscard   unix  -       -       y       -       -       discard\n\
      local     unix  -       n       n       -       -       local\nvirtual   unix\
      \  -       n       n       -       -       virtual\nlmtp      unix  -      \
      \ -       y       -       -       lmtp\nanvil     unix  -       -       y  \
      \     -       1       anvil\nscache    unix  -       -       y       -     \
      \  1       scache\npostlog   unix-dgram n  -       n       -       1       postlogd\n\
      #\n# ====================================================================\n\
      # Interfaces to non-Postfix software. Be sure to examine the manual\n# pages\
      \ of the non-Postfix software to find out what options it wants.\n#\n# Many\
      \ of the following services use the Postfix pipe(8) delivery\n# agent.  See\
      \ the pipe(8) man page for information about ${recipient}\n# and other message\
      \ envelope options.\n# ====================================================================\n\
      #\n# maildrop. See the Postfix MAILDROP_README file for details.\n# Also specify\
      \ in main.cf: maildrop_destination_recipient_limit=1\n#\n#maildrop  unix  -\
      \       n       n       -       -       pipe\n#  flags=DRXhu user=vmail argv=/usr/bin/maildrop\
      \ -d ${recipient}\n#\n# ====================================================================\n\
      #\n# Recent Cyrus versions can use the existing \"lmtp\" master.cf entry.\n\
      #\n# Specify in cyrus.conf:\n#   lmtp    cmd=\"lmtpd -a\" listen=\"localhost:lmtp\"\
      \ proto=tcp4\n#\n# Specify in main.cf one or more of the following:\n#  mailbox_transport\
      \ = lmtp:inet:localhost\n#  virtual_transport = lmtp:inet:localhost\n#\n# ====================================================================\n\
      #\n# Cyrus 2.1.5 (Amos Gouaux)\n# Also specify in main.cf: cyrus_destination_recipient_limit=1\n\
      #\n#cyrus     unix  -       n       n       -       -       pipe\n#  flags=DRX\
      \ user=cyrus argv=/cyrus/bin/deliver -e -r ${sender} -m ${extension} ${user}\n\
      #\n# ====================================================================\n\
      #\n# Old example of delivery via Cyrus.\n#\n#old-cyrus unix  -       n     \
      \  n       -       -       pipe\n#  flags=R user=cyrus argv=/cyrus/bin/deliver\
      \ -e -m ${extension} ${user}\n#\n# ====================================================================\n\
      #\n# See the Postfix UUCP_README file for configuration details.\n#\nuucp  \
      \    unix  -       n       n       -       -       pipe\n  flags=Fqhu user=uucp\
      \ argv=uux -r -n -z -a$sender - $nexthop!rmail ($recipient)\n#\n# Other external\
      \ delivery methods.\n#\n#ifmail    unix  -       n       n       -       - \
      \      pipe\n#  flags=F user=ftn argv=/usr/lib/ifmail/ifmail -r $nexthop ($recipient)\n\
      #bsmtp     unix  -       n       n       -       -       pipe\n#  flags=Fq.\
      \ user=bsmtp argv=/usr/lib/bsmtp/bsmtp -t$nexthop -f$sender $recipient\n#scalemail-backend\
      \ unix -       n       n       -       2       pipe\n#  flags=R user=scalemail\
      \ argv=/usr/lib/scalemail/bin/scalemail-store ${nexthop} ${user} ${extension}\n\
      #mailman   unix  -       n       n       -       -       pipe\n#  flags=FRX\
      \ user=list argv=/usr/lib/mailman/bin/postfix-to-mailman.py ${nexthop} ${user}\n"
    mysql_relay_domains.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query = SELECT domain FROM domain WHERE domain=''%s'' AND active = ''1'' AND
      (transport LIKE ''smtp%%'' OR transport LIKE ''relay%%'')

      '
    mysql_transport_maps.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query = SELECT transport FROM domain WHERE domain=''%s'' AND active = ''1''
      AND transport != ''virtual''

      # Enforce virtual transport (catches internal virtual domains and avoid mails
      being lost in other transport maps)

      #query = SELECT REPLACE(transport, ''virtual'', '':'') AS transport FROM domain
      WHERE domain=''%s'' AND active = ''1''

      '
    mysql_virtual_alias_domain_catchall_maps.cf: '# handles catch-all settings of
      target-domain

      user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query  = SELECT goto FROM alias,alias_domain WHERE alias_domain.alias_domain
      = ''%d'' and alias.address = CONCAT(''@'', alias_domain.target_domain) AND alias.active=''1''
      AND alias_domain.active=''1''

      '
    mysql_virtual_alias_domain_mailbox_maps.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query = SELECT maildir FROM mailbox,alias_domain WHERE alias_domain.alias_domain
      = ''%d'' and mailbox.username = CONCAT(''%u'', ''@'', alias_domain.target_domain)
      AND mailbox.active=''1'' AND alias_domain.active=''1''

      '
    mysql_virtual_alias_domain_maps.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query = SELECT goto FROM alias,alias_domain WHERE alias_domain.alias_domain
      = ''%d'' and alias.address = CONCAT(''%u'', ''@'', alias_domain.target_domain)
      AND alias.active=''1'' AND alias_domain.active=''1''

      '
    mysql_virtual_alias_maps.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query = SELECT goto FROM alias WHERE address=''%s'' AND active = ''1''

      #expansion_limit = 100

      '
    mysql_virtual_domains_maps.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query          = SELECT domain FROM domain WHERE domain=''%s'' AND active =
      ''1''

      #query          = SELECT domain FROM domain WHERE domain=''%s''

      #optional query to use when relaying for backup MX

      #query           = SELECT domain FROM domain WHERE domain=''%s'' AND backupmx
      = ''0'' AND active = ''1''

      #optional query to use for transport map support

      #query           = SELECT domain FROM domain WHERE domain=''%s'' AND active
      = ''1'' AND NOT (transport LIKE ''smtp%%'' OR transport LIKE ''relay%%'')

      #expansion_limit = 100

      '
    mysql_virtual_mailbox_limit_maps.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query = SELECT quota FROM mailbox WHERE username=''%s'' AND active = ''1''

      '
    mysql_virtual_mailbox_maps.cf: 'user = postfixadmin

      password = postfixadminPassword

      hosts = main-mysql-master

      dbname = postfixadmin

      query           = SELECT maildir FROM mailbox WHERE username=''%s'' AND active
      = ''1''

      #expansion_limit = 100

      '
