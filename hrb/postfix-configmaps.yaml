        unix -       -       n       -       1       proxymap\nsmtp      unix  -       -       y       -       -       smtp\nrelay     unix  -       -       y       -       -       smtp\n        -o
        syslog_name=postfix/$service_name\n#       -o smtp_helo_timeout=5 -o smtp_connect_timeout=5\nshowq     unix  n       -       y       -       -       showq\nerror     unix  -       -       y       -       -       error\nretry     unix  -       -       y       -       -       error\ndiscard   unix  -       -       y       -       -       discard\nlocal     unix  -       n       n       -       -       local\nvirtual   unix  -       n       n       -       -       virtual\nlmtp      unix  -       -       y       -       -       lmtp\nanvil     unix  -       -       y       -       1       anvil\nscache    unix  -       -       y       -       1       scache\npostlog   unix-dgram
        n  -       n       -       1       postlogd\n#\n# ====================================================================\n#
        Interfaces to non-Postfix software. Be sure to examine the manual\n# pages
        of the non-Postfix software to find out what options it wants.\n#\n# Many
        of the following services use the Postfix pipe(8) delivery\n# agent.  See
        the pipe(8) man page for information about ${recipient}\n# and other message
        envelope options.\n# ====================================================================\n#\n#
        maildrop. See the Postfix MAILDROP_README file for details.\n# Also specify
        in main.cf: maildrop_destination_recipient_limit=1\n#\n#maildrop  unix  -       n       n       -       -       pipe\n#  flags=DRXhu
        user=vmail argv=/usr/bin/maildrop -d ${recipient}\n#\n# ====================================================================\n#\n#
        Recent Cyrus versions can use the existing \"lmtp\" master.cf entry.\n#\n#
        Specify in cyrus.conf:\n#   lmtp    cmd=\"lmtpd -a\" listen=\"localhost:lmtp\"
        proto=tcp4\n#\n# Specify in main.cf one or more of the following:\n#  mailbox_transport
        = lmtp:inet:localhost\n#  virtual_transport = lmtp:inet:localhost\n#\n# ====================================================================\n#\n#
        Cyrus 2.1.5 (Amos Gouaux)\n# Also specify in main.cf: cyrus_destination_recipient_limit=1\n#\n#cyrus     unix  -       n       n       -       -       pipe\n#  flags=DRX
        user=cyrus argv=/cyrus/bin/deliver -e -r ${sender} -m ${extension} ${user}\n#\n#
        ====================================================================\n#\n#
        Old example of delivery via Cyrus.\n#\n#old-cyrus unix  -       n       n       -       -       pipe\n#  flags=R
        user=cyrus argv=/cyrus/bin/deliver -e -m ${extension} ${user}\n#\n# ====================================================================\n#\n#
        See the Postfix UUCP_README file for configuration details.\n#\nuucp      unix  -       n       n       -       -       pipe\n  flags=Fqhu
        user=uucp argv=uux -r -n -z -a$sender - $nexthop!rmail ($recipient)\n#\n#
        Other external delivery methods.\n#\n#ifmail    unix  -       n       n       -       -       pipe\n#  flags=F
        user=ftn argv=/usr/lib/ifmail/ifmail -r $nexthop ($recipient)\n#bsmtp     unix  -       n       n       -       -       pipe\n#  flags=Fq.
        user=bsmtp argv=/usr/lib/bsmtp/bsmtp -t$nexthop -f$sender $recipient\n#scalemail-backend
        unix -       n       n       -       2       pipe\n#  flags=R user=scalemail
        argv=/usr/lib/scalemail/bin/scalemail-store ${nexthop} ${user} ${extension}\n#mailman   unix  -       n       n       -       -       pipe\n#  flags=FRX
        user=list argv=/usr/lib/mailman/bin/postfix-to-mailman.py ${nexthop} ${user}\n","mysql_relay_domains.cf":"user
        = postfixadmin\npassword = postfixadminPassword\nhosts = main-mysql-master\ndbname
        = postfixadmin\nquery = SELECT domain FROM domain WHERE domain=''%s'' AND
        active = ''1'' AND (transport LIKE ''smtp%%'' OR transport LIKE ''relay%%'')\n","mysql_transport_maps.cf":"user
        = postfixadmin\npassword = postfixadminPassword\nhosts = main-mysql-master\ndbname
        = postfixadmin\nquery = SELECT transport FROM domain WHERE domain=''%s'' AND
        active = ''1'' AND transport != ''virtual''\n# Enforce virtual transport (catches
        internal virtual domains and avoid mails being lost in other transport maps)\n#query
        = SELECT REPLACE(transport, ''virtual'', '':'') AS transport FROM domain WHERE
        domain=''%s'' AND active = ''1''\n","mysql_virtual_alias_domain_catchall_maps.cf":"#
        handles catch-all settings of target-domain\nuser = postfixadmin\npassword
        = postfixadminPassword\nhosts = main-mysql-master\ndbname = postfixadmin\nquery  =
        SELECT goto FROM alias,alias_domain WHERE alias_domain.alias_domain = ''%d''
        and alias.address = CONCAT(''@'', alias_domain.target_domain) AND alias.active=''1''
        AND alias_domain.active=''1''\n","mysql_virtual_alias_domain_mailbox_maps.cf":"user
        = postfixadmin\npassword = postfixadminPassword\nhosts = main-mysql-master\ndbname
        = postfixadmin\nquery = SELECT maildir FROM mailbox,alias_domain WHERE alias_domain.alias_domain
        = ''%d'' and mailbox.username = CONCAT(''%u'', ''@'', alias_domain.target_domain)
        AND mailbox.active=''1'' AND alias_domain.active=''1''\n","mysql_virtual_alias_domain_maps.cf":"user
        = postfixadmin\npassword = postfixadminPassword\nhosts = main-mysql-master\ndbname
        = postfixadmin\nquery = SELECT goto FROM alias,alias_domain WHERE alias_domain.alias_domain
        = ''%d'' and alias.address = CONCAT(''%u'', ''@'', alias_domain.target_domain)
        AND alias.active=''1'' AND alias_domain.active=''1''\n","mysql_virtual_alias_maps.cf":"user
        = postfixadmin\npassword = postfixadminPassword\nhosts = main-mysql-master\ndbname
        = postfixadmin\nquery = SELECT goto FROM alias WHERE address=''%s'' AND active
        = ''1''\n#expansion_limit = 100\n","mysql_virtual_domains_maps.cf":"user =
        postfixadmin\npassword = postfixadminPassword\nhosts = main-mysql-master\ndbname
        = postfixadmin\nquery          = SELECT domain FROM domain WHERE domain=''%s''
        AND active = ''1''\n#query          = SELECT domain FROM domain WHERE domain=''%s''\n#optional
        query to use when relaying for backup MX\n#query           = SELECT domain
        FROM domain WHERE domain=''%s'' AND backupmx = ''0'' AND active = ''1''\n#optional
        query to use for transport map support\n#query           = SELECT domain FROM
        domain WHERE domain=''%s'' AND active = ''1'' AND NOT (transport LIKE ''smtp%%''
        OR transport LIKE ''relay%%'')\n#expansion_limit = 100\n","mysql_virtual_mailbox_limit_maps.cf":"user
        = postfixadmin\npassword = postfixadminPassword\nhosts = main-mysql-master\ndbname
        = postfixadmin\nquery = SELECT quota FROM mailbox WHERE username=''%s'' AND
        active = ''1''\n","mysql_virtual_mailbox_maps.cf":"user = postfixadmin\npassword
        = postfixadminPassword\nhosts = main-mysql-master\ndbname = postfixadmin\nquery           =
        SELECT maildir FROM mailbox WHERE username=''%s'' AND active = ''1''\n#expansion_limit
        = 100\n"},"kind":"ConfigMap","metadata":{"annotations":{},"labels":{"app.kubernetes.io/name":"posttfix"},"name":"postfix-config","namespace":"hrb"}}

