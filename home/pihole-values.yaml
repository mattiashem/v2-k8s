replicaCount: 1
doh:
  enabled: true
dnsmasq:
  customDnsEntries:
    - address=/nas/192.168.1.10
 
  customCnameEntries:
    - cname=foo.nas,nas

persistentVolumeClaim:
  enabled: true

serviceWeb:
  annotations:
    metallb.universe.tf/allow-shared-ip: pihole-lan
    metallb.universe.tf/ip-allocated-from-pool: pihole-lan
  type: LoadBalancer

serviceDns:
  annotations:
    metallb.universe.tf/allow-shared-ip: pihole-lan
    metallb.universe.tf/ip-allocated-from-pool: pihole-lan
  type: LoadBalancer
