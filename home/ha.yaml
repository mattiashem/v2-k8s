apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homeassistant-longhorn
  namespace: home
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      containers:
        - name: homeassistant
          # https://hub.docker.com/r/pihole/pihole/tags
          image: homeassistant/home-assistant
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "America/Los_Angeles"
            - name: WEBPASSWORD
              value: "v2password"
          #securityContext:
          #  privileged: true
          ports:
            - containerPort: 8123
              protocol: TCP
          volumeMounts:
             - name: homeassistant
               mountPath: /config
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: 1000m
      volumes:
        - name: homeassistant
          persistentVolumeClaim:
            claimName: homeassistant-longhorn
        #- name: dev-zwave
        #  hostPath:
        #    path: /dev/usbzwave
        #- name: dev-insteon
        #  hostPath:
        #    path: /dev/usbinsteon


---  
apiVersion: v1
kind: Service
metadata:
  labels:
    app: homeassistant
  name: homeassistant
  namespace: home
spec:
  ports:
  - name: homeassistant
    port: 8123
    protocol: TCP
    targetPort: 8123
  selector:
    app: homeassistant
  sessionAffinity: None
  type: ClusterIP

---
# Direct LAN LoadBalancer for HA-to-HA links (Remote Home Assistant on 192.168.1.2).
# Bypasses Traefik so the long-lived WebSocket has no proxy in the path.
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: lan
  labels:
    app: homeassistant
  name: homeassistant-lan
  namespace: home
spec:
  ports:
  - name: ha
    port: 8123
    protocol: TCP
    targetPort: 8123
  selector:
    app: homeassistant
  type: LoadBalancer

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
  name: ha
  namespace: home
spec:
  rules:
  - host: ha.v2.local
    http:
      paths:
      - backend:
          service:
            name: homeassistant
            port:
              number: 8123
        path: /
        pathType: Prefix

