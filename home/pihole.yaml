apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-etc
  namespace: home
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-dnsmasq
  namespace: home
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
      number: "1"
  template:
    metadata:
      labels:
        app: pihole
        number: "1"
    spec:
      containers:
        - name: orbital
          # https://hub.docker.com/r/pihole/pihole/tags
          image: mattwebbio/orbital-sync:1
          imagePullPolicy: IfNotPresent
          env:
            - name: PRIMARY_HOST_BASE_URL
              value: "http://pihole-dmz.home.svc"
            - name: PRIMARY_HOST_PASSWORD
              value: "v2password"
            - name: SECONDARY_HOSTS_1_BASE_URL
              value: "http://pihole-dmz-2.home.svc"
            - name: SECONDARY_HOSTS_1_PASSWORD
              value: "v2password"
            - name: INTERVAL_MINUTES
              value: "5"
        - name: pihole
          # https://hub.docker.com/r/pihole/pihole/tags
          image: pihole/pihole:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Europe/Stockholm"
            - name: FTLCONF_webserver_api_password
              value: "v2password"
          #securityContext:
          #  privileged: true
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
            - containerPort: 67
              protocol: UDP
            - containerPort: 80
              protocol: TCP
            - containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: etc
              mountPath: /etc/pihole
            - name: dnsmasq
              mountPath: /etc/dnsmasq.d
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: 1
      nodeSelector:
        pihole: "1"
      volumes:
        - name: etc
          persistentVolumeClaim:
            claimName: pihole-etc
        - name: dnsmasq
          persistentVolumeClaim:
            claimName: pihole-dnsmasq
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: pihole-lan2
    external-dns.alpha.kubernetes.io/hostname: pihole.socomp.se
  labels:
    app: pihole
  name: pihole-lan2
  namespace: home
spec:
  ports:
  - name: dns
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dnsudp
    port: 53
    protocol: UDP
    targetPort: 53
  internalTrafficPolicy: Local
  externalTrafficPolicy: Local
  selector:
    app: pihole
    number: "2"
  #sessionAffinity: None
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: pihole-lan
    #metallb.io/loadBalancerIPs: 192.168.1.17
  labels:
    app: pihole
  name: pihole-lan
  namespace: home
spec:
  ports:
  - name: dns
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dnsudp
    port: 53
    protocol: UDP
    targetPort: 53
  selector:
    app: pihole
    number: "1"
  #sessionAffinity: None
  internalTrafficPolicy: Local
  externalTrafficPolicy: Local
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: pihole
  labels:
    app: pihole
  name: pihole-dmz
  namespace: home
spec:
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  ports:
  - name: dns
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dnsudp
    port: 53
    protocol: UDP
    targetPort: 53
  - name: web
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: pihole
    number: "1"
  sessionAffinity: None
  type: LoadBalancer

---
