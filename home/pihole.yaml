apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-etc
  namespace: home
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-dnsmasq
  namespace: home
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
      number: "1"
  template:
    metadata:
      labels:
        app: pihole
        number: "1"
    spec:
      containers:
        # orbital-sync removed: v1 only speaks the Pi-hole v5 /admin login API,
        # which is gone in Pi-hole v6 (returns 404). Replaced by the standalone
        # nebula-sync Deployment below, which uses the v6 Teleporter API.
        - name: pihole
          # https://hub.docker.com/r/pihole/pihole/tags
          image: pihole/pihole:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Europe/Stockholm"
            - name: FTLCONF_webserver_api_password
              value: "v2password"
            # ALL (not LOCAL): queries arrive via the LoadBalancer VIP from
            # non-pod-local sources (and SNAT'd node IPs under Cluster policy),
            # so LOCAL mode silently drops every LAN query. Required for the
            # round-robin VIP to actually answer 192.168.1.0/24 clients.
            - name: FTLCONF_dns_listeningMode
              value: "ALL"
          #securityContext:
          #  privileged: true
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
            - containerPort: 67
              protocol: UDP
            - containerPort: 80
              protocol: TCP
            - containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: etc
              mountPath: /etc/pihole
            - name: dnsmasq
              mountPath: /etc/dnsmasq.d
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 2Gi
              cpu: 1
      nodeSelector:
        pihole: "1"
      volumes:
        - name: etc
          persistentVolumeClaim:
            claimName: pihole-etc
        - name: dnsmasq
          persistentVolumeClaim:
            claimName: pihole-dnsmasq
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: pihole-lan2
    external-dns.alpha.kubernetes.io/hostname: pihole.v2.local
  labels:
    app: pihole
  name: pihole-lan2
  namespace: home
spec:
  ports:
  - name: dns
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dnsudp
    port: 53
    protocol: UDP
    targetPort: 53
  internalTrafficPolicy: Local
  externalTrafficPolicy: Local
  selector:
    app: pihole
    number: "2"
  #sessionAffinity: None
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: pihole-lan
    #metallb.io/loadBalancerIPs: 192.168.1.17
  labels:
    app: pihole
  name: pihole-lan
  namespace: home
spec:
  ports:
  - name: dns
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dnsudp
    port: 53
    protocol: UDP
    targetPort: 53
  # Round-robin HA VIP (192.168.1.17): selects BOTH pihole pods.
  # externalTrafficPolicy: Cluster so the MetalLB owner node can forward to a
  # pod on either node -> load-balances across both, and fails over to the
  # surviving pod if one is down (e.g. primary's disk won't mount).
  # Tradeoff: client source IPs are SNAT'd on this VIP. Per-client query stats
  # remain on the per-instance admin VIPs (pihole-dmz / pihole-dmz-2).
  selector:
    app: pihole
  internalTrafficPolicy: Cluster
  externalTrafficPolicy: Cluster
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: pihole
  labels:
    app: pihole
  name: pihole-dmz
  namespace: home
spec:
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  ports:
  - name: dns
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dnsudp
    port: 53
    protocol: UDP
    targetPort: 53
  - name: web
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: pihole
    number: "1"
  sessionAffinity: None
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-2
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
      number: "2"
  template:
    metadata:
      labels:
        app: pihole
        number: "2"
    spec:
      containers:
        - name: pihole
          # https://hub.docker.com/r/pihole/pihole/tags
          image: pihole/pihole:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Europe/Stockholm"
            - name: FTLCONF_webserver_api_password
              value: "v2password"
            # ALL (not LOCAL): queries arrive via the LoadBalancer VIP from
            # non-pod-local sources (and SNAT'd node IPs under Cluster policy),
            # so LOCAL mode silently drops every LAN query. Required for the
            # round-robin VIP to actually answer 192.168.1.0/24 clients.
            - name: FTLCONF_dns_listeningMode
              value: "ALL"
          #securityContext:
          #  privileged: true
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
            - containerPort: 67
              protocol: UDP
            - containerPort: 80
              protocol: TCP
            - containerPort: 443
              protocol: TCP
      nodeSelector:
        pihole: "2"

---

---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/address-pool: dmz
  labels:
    app: pihole
    number: "2"
  name: pihole-dmz-2
  namespace: home
spec:
  ports:
  - name: dns
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dnsudp
    port: 53
    protocol: UDP
    targetPort: 53
  - name: web
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: pihole
    number: "2"
  sessionAffinity: None
  type: LoadBalancer

---
# Pi-hole v6 config replication: primary (source of truth) -> secondary (clean).
# Uses the v6 Teleporter API (FULL_SYNC), so the secondary is fully overwritten
# from the primary every run. Standalone so a sync/image failure never affects DNS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebula-sync
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nebula-sync
  template:
    metadata:
      labels:
        app: nebula-sync
    spec:
      containers:
        - name: nebula-sync
          # https://github.com/lovelaze/nebula-sync — verify tag pulls (ImagePullBackOff = bump)
          image: ghcr.io/lovelaze/nebula-sync:v0.11.2
          imagePullPolicy: IfNotPresent
          env:
            - name: PRIMARY
              value: "http://pihole-dmz.home.svc|v2password"
            - name: REPLICAS
              value: "http://pihole-dmz-2.home.svc|v2password"
            - name: FULL_SYNC
              value: "true"
            # Rebuild the replica's gravity (blocklist) DB after each import.
            # Without this the secondary keeps its default ~80k list and would
            # not block what the primary blocks on failover.
            - name: RUN_GRAVITY
              value: "true"
            # Hourly: config + a full gravity rebuild (downloads the adlists).
            # Every 5 min would hammer the blocklist providers; the secondary is
            # failover-only so hourly freshness is plenty.
            - name: CRON
              value: "0 * * * *"
            - name: TZ
              value: "Europe/Stockholm"
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 200m

