ollama:
  gpu:
    enabled: false
  models:
    pull:
      - mistral
      - llama3
      - gemma3:27b

# RK3588 tuning: single concurrent request, keep model warm for 5 min
extraEnv:
  - name: OLLAMA_NUM_PARALLEL
    value: "1"
  - name: OLLAMA_KEEP_ALIVE
    value: "5m"

nodeSelector:
  kubernetes.io/hostname: turing2

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "ollama"
    effect: "NoExecute"

persistentVolume:
  enabled: true
  size: 50Gi

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure,web
    external-dns.alpha.kubernetes.io/hostname: ollama.v2.local
  hosts:
  - host: ollama.v2.local
    paths:
      - path: /
        pathType: Prefix
