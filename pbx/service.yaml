apiVersion: v1
kind: Service
metadata:
  name: mikopbx-lb
  namespace: pbx
spec:
  type: LoadBalancer
  # If you are on AWS/GCP/Azure, you might need specific annotations here 
  # to support mixed protocols (TCP/UDP) on one Load Balancer.
  selector:
    app: mikopbx
  ports:
    - name: webb
      port: 8080
      targetPort: 8080
   # --- SIP Internal (Signaling) ---
    - name: sip-internal-udp
      port: 5060
      targetPort: 5060
      protocol: UDP
    - name: sip-internal-tcp
      port: 5060
      targetPort: 5060
      protocol: TCP

    # --- SIP External (Signaling) ---
    - name: sip-external-tcp
      port: 5061
      targetPort: 5061
      protocol: UDP



    # --- RTP / Media Ports (Sample Range: 16384-16393) ---
    # NOTE: You cannot define a range (e.g. 16384-32768) directly in standard K8s YAML.
    # You must list them one by one. This is a small sample.
